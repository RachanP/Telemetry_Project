global:
  scrape_interval: 10s   # ← เปลี่ยน PROMETHEUS_SCRAPE_INTERVAL ใน .env แล้วแก้ตรงนี้ด้วย

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gnmic'
    static_configs:
      - targets: ['host.docker.internal:9804']   # ← ตรงกับ GNMI_EXPORTER_PORT ใน .env

  - job_name: 'sonic_temperature'
    static_configs:
      - targets: ['host.docker.internal:9805']   # ← ตรงกับ TEMP_EXPORTER_PORT ใน .env