      - "/openconfig-interfaces:interfaces/interface[name=Ethernet53]/state"
    mode: stream
    stream-mode: sample
    sample-interval: 20s            # ← GNMI_SAMPLE_INTERVAL ใน .env
    encoding: json_ietf

outputs:
  output-prom:
    type: prometheus
    listen: :9804                   # ← GNMI_EXPORTER_PORT ใน .env
    metric-prefix: sonic_
    strings-as-labels: true
    expiration: 5m
    event-processors:
      - convert-counters