# ============================================================
#  แก้เฉพาะ section [targets] เมื่อเปลี่ยนเครื่อง SONiC
#  ค่า address / username / password ต้องตรงกับ .env
# ============================================================

targets:
  switch1:                          # ← ชื่อนี้ต้องตรงกับ SWITCH_NAME ใน .env
    address: 192.168.1.11:8080      # ← SWITCH_IP:SWITCH_PORT
    username: admin                 # ← SWITCH_USER
    password: YourPaSsWoRd         # ← SWITCH_PASS
    insecure: true

processors:
  convert-counters:
    event-convert:
      value-names:
        - "in-octets"
        - "out-octets"
        - "in-pkts"
        - "out-pkts"
        - "in-unicast-pkts"
        - "out-unicast-pkts"
        - "in-broadcast-pkts"
        - "out-broadcast-pkts"
        - "in-multicast-pkts"
        - "out-multicast-pkts"
        - "in-discards"
        - "out-discards"
        - "in-errors"
        - "out-errors"
        - "mtu"
      type: int

subscriptions:
  all-interfaces:
    target: "openconfig"
    paths:
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet0]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet1]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet2]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet3]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet4]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet5]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet6]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet7]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet8]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet9]/state"
      - "/openconfig-interfaces:interfaces/interface[name=Ethernet10]/state"
